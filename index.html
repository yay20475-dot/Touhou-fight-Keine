<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reimu & Marisa & Sakuya vs Keine - Special Bomb Edition</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; background: #050510; }
        #ui {
            position: absolute; top: 15px; left: 15px; color: white; 
            pointer-events: none; text-shadow: 2px 2px 4px #000;
        }
        #bomb-btn, #switch-btn {
            position: absolute; border-radius: 50%; border: 2px solid white;
            color: white; font-weight: bold; display: flex;
            align-items: center; justify-content: center; z-index: 10;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        #bomb-btn {
            bottom: 30px; right: 30px; width: 80px; height: 80px;
            background: rgba(255, 0, 0, 0.6); box-shadow: 0 0 15px red;
        }
        #switch-btn {
            bottom: 30px; left: 30px; width: 80px; height: 80px;
            background: rgba(0, 255, 100, 0.4); box-shadow: 0 0 15px green;
        }
        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center;
        }

    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="color: #ff44ff;">TOUHOU FIGHT - SPECIAL BOMB</h1>
        <p> Reimu & Marisa & Sakuya vs Keine</p>
        <div style="margin-top: 20px; padding: 15px; border: 2px solid #fff;">TAP TO START</div>
    </div>

    <div id="ui">
        Boss HP: <span id="hp-val">3500</span><br>
        Char: <span id="char-name" style="color: #44aaff;">REIMU</span><br>
        Bombs: <span id="bomb-val">3</span>
    </div>

    <div id="switch-btn">SWITCH</div>
    <div id="bomb-btn">BOMB</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

const imgReimu = new Image();
const imgMarisa = new Image();
const imgSakuya = new Image();
const imgKeine = new Image();

imgKeine.src = "https://i.ibb.co/W4S85VBR/image.png";
imgReimu.src = "https://i.ibb.co/twm06KF3/image.png";
imgMarisa.src = "https://i.ibb.co/bYzf4KP/image.png";
imgSakuya.src = "https://i.ibb.co/bjfQGhQv/image.png";

let timeStop = 0;

        let gameStarted = false, currentPlayer = "reimu", isGameOver = false;

let arrows = [];

let player = {
    x: canvas.width/2,
    y: canvas.height - 150,
    r: 1,
    visualR: 15,
    bombs: 3,
    invuln: 0
};

        let boss = { x: canvas.width/2, y: 150, hp: 3500, maxHp: 3500, r: 35 };
        let enemyBullets = [], playerBullets = [], lasers = [], bombEffects = [];
        let bombTimer = 0, shake = 0, frame = 0;

function getHitbox() {
    return currentPlayer === "reimu" ? 1 : 1.5;
}

        class Bullet {
            constructor(x, y, angle, speed, color, radius = 4, damage = 1.8, isHoming = false) {
                this.x = x; this.y = y; this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                this.color = color; this.radius = radius; this.damage = damage; this.isHoming = isHoming;
            }
            update() {
                if (this.isHoming) {
                    let angleToBoss = Math.atan2(boss.y - this.y, boss.x - this.x);
                    this.vx += Math.cos(angleToBoss) * 0.5;
                    this.vy += Math.sin(angleToBoss) * 0.5;
                    let speed = Math.hypot(this.vx, this.vy);
                    if (speed > 8) { this.vx *= 8/speed; this.vy *= 8/speed; }
                }
                this.x += this.vx; this.y += this.vy;

            }

            draw() {

if (currentPlayer === "sakuya" && this.isHoming) {

    ctx.save();

    let angle = Math.atan2(this.vy, this.vx);
    ctx.translate(this.x, this.y);
    ctx.rotate(angle);

    // 🔷 thân dao (xanh biển)
    ctx.fillStyle = "#3399ff";
    ctx.fillRect(-14, -2, 24, 4);

    // 🔷 đầu dao (dài + nhọn hơn)
    ctx.beginPath();
    ctx.moveTo(10, -4);
    ctx.lineTo(18, 0);
    ctx.lineTo(10, 4);
    ctx.closePath();
    ctx.fill();

    // ✝️ thanh dọc (thập giá ngược)
    ctx.fillRect(-10, -10, 4, 20);

    // ✨ lõi sáng
    ctx.fillStyle = "white";
    ctx.fillRect(-14, -1, 24, 2);
    ctx.fillRect(-9, -7, 2, 14);

    // 🌟 glow xanh nhẹ
    ctx.strokeStyle = "rgba(100,180,255,0.7)";
    ctx.lineWidth = 1;
    ctx.strokeRect(-14, -2, 24, 4);

    ctx.restore();

    return;
}

                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
                if (this.isHoming) { // Hiệu ứng hào quang cho Orb của Reimu
                    ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
                }
            }
        }

class Arrow {
    constructor(x, y, angle) {
        this.x = x;
        this.y = y;
        this.angle = angle;

        this.vx = Math.cos(angle) * 2;
        this.vy = Math.sin(angle) * 2;

        this.timer = 0;
        this.state = "move"; // move → stop → explode
    }

    update() {
        this.timer++;

        if (this.state === "move") {
            this.x += this.vx;
            this.y += this.vy;

            if (this.timer > 30) {
                this.state = "stop";
                this.vx = 0;
                this.vy = 0;
            }
        } 
        else if (this.state === "stop") {
            if (this.timer > 70) {
                this.explode();
                this.dead = true;
            }
        }
    }

    explode() {
        // 💥 nổ thành vòng đạn nhỏ
        for (let i = 0; i < 12; i++) {
            enemyBullets.push(new Bullet(
                this.x,
                this.y,
                i * Math.PI * 2 / 12,
                2.5,
                "#ffaa00",
                3
            ));
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        // 🏹 thân mũi tên
        ctx.fillStyle = "#ffaa00";
        ctx.fillRect(-10, -2, 20, 4);

        // đầu nhọn
        ctx.beginPath();
        ctx.moveTo(10, 0);
        ctx.lineTo(16, -4);
        ctx.lineTo(16, 4);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
    }
}

        class Laser {
    constructor() {
        this.reset();
    }

    reset() {
        this.timer = 0;

        // 🎲 random hướng
        this.side = Math.random() < 0.5 ? "left" : "right";

        this.currentX = (this.side === "left") ? -300 : canvas.width + 300;
        this.speed = (this.side === "left") ? 5 : -5;

        this.targetY = player.y;
        this.active = true;
        this.firing = false;
    }

    update() {
        this.timer++;

        // lock vị trí player lúc bắt đầu
        if (this.timer === 1) {
            this.targetY = player.y;
        }

        // bắt đầu bắn ngay
        if (this.timer > 10) {
            this.firing = true;
        }

        // 🚀 bay thẳng luôn (mượt hơn lerp)
        this.currentX += this.speed;

        // ra khỏi màn → reset
        if (
            this.currentX < -400 ||
            this.currentX > canvas.width + 400
        ) {
            this.reset();
        }
    }

    draw() {
        if (!this.active) return;

        let length = canvas.width;
        let thickness = 18;

        ctx.save();
        ctx.translate(this.currentX, this.targetY);

        // glow
        ctx.fillStyle = "rgba(255,200,0,0.15)";
        ctx.fillRect(-length/2, -thickness, length, thickness*2);

        // laser chính
        ctx.fillStyle = this.firing ? "#ff4444" : "#ffaa00";
        ctx.fillRect(-length/2, -thickness/2, length, thickness);

        // lõi trắng
        ctx.fillStyle = "white";
        ctx.fillRect(-length/2, -3, length, 6);

        ctx.restore();
    }
}
        lasers = [new Laser()];

        document.getElementById("start-overlay").addEventListener("touchstart", () => {
            gameStarted = true; document.getElementById("start-overlay").style.display = "none"; requestAnimationFrame(draw);
        }, { once: true });

let lastTouchX = null;
let lastTouchY = null;

window.addEventListener("touchstart", (e) => {

    if (!gameStarted || isGameOver || boss.hp <= 0) return;

    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;

}, { passive: false });

window.addEventListener("touchmove", (e) => {

    if (!gameStarted || isGameOver || boss.hp <= 0) return;

    e.preventDefault();

    let touchX = e.touches[0].clientX;
    let touchY = e.touches[0].clientY;

    // 👆 lượng vuốt
    let dx = touchX - lastTouchX;
    let dy = touchY - lastTouchY;

    // 🎮 di chuyển kiểu swipe
    player.x += dx;
    player.y += dy;

    // cập nhật touch cuối
    lastTouchX = touchX;
    lastTouchY = touchY;

    // giới hạn màn hình
    player.x = Math.max(10, Math.min(canvas.width - 10, player.x));
    player.y = Math.max(10, Math.min(canvas.height - 10, player.y));

}, { passive: false });

window.addEventListener("touchend", () => {

    lastTouchX = null;
    lastTouchY = null;

});


document.getElementById("switch-btn").addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (isGameOver) return;

   if (currentPlayer === "reimu") currentPlayer = "marisa";
else if (currentPlayer === "marisa") currentPlayer = "sakuya";
else currentPlayer = "reimu";

    document.getElementById("char-name").innerText = currentPlayer.toUpperCase();
    document.getElementById("char-name").style.color =
    (currentPlayer === "reimu") ? "#44aaff" :
    (currentPlayer === "marisa") ? "#ffff00" :
    "#cccccc";
});

        document.getElementById("bomb-btn").addEventListener("touchstart", (e) => {
            e.preventDefault();
            if (player.bombs > 0 && !isGameOver && bombTimer === 0) {
                player.bombs--; document.getElementById("bomb-val").innerText = player.bombs;
                bombTimer = 120; shake = 10; player.invuln = 150;
                if (currentPlayer === "reimu") { // Fantasy Seal
                    for (let i = 0; i < 7; i++) {
                        bombEffects.push(new Bullet(player.x, player.y, (i * Math.PI * 2 / 7), 5, "#ff0088", 12, 60, true));
                    }
                }

if (currentPlayer === "sakuya") {
    timeStop = 120;

    // 💥 bắn dao mọi hướng
    for (let i = 0; i < 40; i++) {
        let angle = (i / 40) * Math.PI * 2;

        playerBullets.push(
            new Bullet(
                player.x,
                player.y,
                angle,
                10,
                "#3399ff",
                3,
                15,
                true // 👈 QUAN TRỌNG: homing để hiện dao
            )
        );
    }
}

                if (navigator.vibrate) navigator.vibrate(200);
            }
        });

let lastCycle = -1;
let phaseStartFrame = 0; // ⏱️ Biến nhớ lưu frame bắt đầu của phase hiện tại

function spawnDanmaku() {

    if (timeStop > 0) return;

    frame++; 
    let cycle = frame % 1200;

    // Xác định id của phase hiện tại dựa trên cycle
    let currentPhaseId = 1;
    if (cycle >= 400 && cycle < 800) currentPhaseId = 2;
    else if (cycle >= 800) currentPhaseId = 3;

    // Xác định id của phase ở frame trước đó
    let lastPhaseId = 1;
    if (lastCycle >= 400 && lastCycle < 800) lastPhaseId = 2;
    else if (lastCycle >= 800) lastPhaseId = 3;

    // 🔄 TỰ ĐỘNG RESET TIME XOÁY KHI CHUYỂN PHASE (Bao gồm cả khi cycle lặp lại từ 1199 về 0)
    if (currentPhaseId !== lastPhaseId || lastCycle === -1) {
        phaseStartFrame = frame;
    }

    // vào phase laser
    if (cycle >= 800 && lastCycle < 400) {
        lasers.forEach(l => l.reset());
    }

    lastCycle = cycle;

    if (timeStop <= 0) {
        boss.x = (canvas.width/2) + Math.sin(frame * 0.01) * (canvas.width/4);
    }
    if (bombTimer > 0) { enemyBullets = []; return; } // Clear bullets during bomb

    if (cycle < 400) {
        let spawnRate = 6;
        if (player.y < canvas.height / 2) {
            spawnRate = 3;
        }

        if (frame % spawnRate === 0) {
            
            // ⏱️ QUY LUẬT XOAY GỐC (Tính toán dựa trên số frame đã trôi qua TRONG phase này)
            let spinAmount = 0;
            let phaseElapsedTime = frame - phaseStartFrame; // Đếm số frame độc lập từ khi vào phase 1

            if (phaseElapsedTime >= 180) {
                let activeFrame = phaseElapsedTime - 180;
                spinAmount = activeFrame * 0.015; // Tốc độ xoay nền tích lũy lại từ đầu
            }

            // 🌟 CHẠY ĐÚNG 16 TIA VÀ CHIA GÓC THEO LÝ THUYẾT i / 8
            for (let i = 0; i < 16; i++) {
                
                // 🔄 TÁCH BIỆT CHIỀU XOAY ĐAN XEN:
                let currentSpin = 0;
                let spawnRadius = 40;

                if (i % 2 === 0) {
                    currentSpin = spinAmount;       // Tia chẵn: Xoay xuôi chiều kim đồng hồ
                    spawnRadius = 40;               // Spawn gần Boss
                } else {
                    currentSpin = -spinAmount;      // Tia lẻ: Xoay NGƯỢC chiều kim đồng hồ
                    spawnRadius = 65;               // Spawn xa Boss
                }

                // Tính góc bay cuối cùng sau khi áp dụng góc xoay riêng biệt
                let finalAngle = (i * Math.PI / 8) + currentSpin; 

                // Tính vị trí spawn dựa trên bán kính đan xen và góc đã xoay
                let px = boss.x + Math.cos(finalAngle) * spawnRadius;
                let py = boss.y + Math.sin(finalAngle) * spawnRadius;

                // Đạn bắn thẳng theo góc finalAngle, tạo hiệu ứng 2 tầng đạn xoáy đan chéo nhau
                enemyBullets.push(
                    new Bullet(px, py, finalAngle, 2.6, "blue", 10)
                );
            }
        }
    } else if (cycle < 800) {

        if (timeStop <= 0) {
            lasers.forEach(l => l.update());
        }

        if (frame % 2 === 0) {
            // Tạo hiệu ứng xoáy bằng cách tăng góc theo thời gian (frame)
            let baseAngle = (frame * 0.1) % (Math.PI * 2); 
            
            // Bắn 4 tia cách đều nhau 90 độ (PI / 2)
            for (let i = 0; i < 4; i++) {
                let angle = baseAngle + (i * Math.PI / 2);
                
                enemyBullets.push(new Bullet(
                    boss.x,
                    boss.y,
                    angle,
                    4,
                    "#0000ff",
                    4
                ));
            }
        }
    }

    else if (cycle < 1200) {

        // Bắn đạn theo nhịp (mỗi 40 frame một đợt)
        if (frame % 40 === 0) {
            // Lấy một góc ngẫu nhiên nhỏ để các đợt lưới không bị trùng lặp vị trí
            let offsetAngle = Math.random() * 0.2; 

            // Bắn 12 luồng đạn chia đều góc
            for (let i = 0; i < 12; i++) {
                let baseAngle = (i * Math.PI / 6) + offsetAngle;

                // Mỗi luồng bắn ra 3 viên đạn nối đuôi nhau (tạo thành hàng đạn thẳng)
                for (let j = 0; j < 3; j++) {
                    let speed = 2.5 + (j * 0.4); // Các viên phía sau bay nhanh hơn một chút để xếp hàng

                    // Luồng 1: Xoáy xuôi (Màu đỏ)
                    enemyBullets.push(new Bullet(
                        boss.x,
                        boss.y,
                        baseAngle + 0.3,
                        speed,
                        "#ff0055", 
                        4
                    ));

                    // Luồng 2: Xoáy ngược (Màu xanh dương) - Tạo hiệu ứng đan chéo thành lưới
                    enemyBullets.push(new Bullet(
                        boss.x,
                        boss.y,
                        baseAngle - 0.3,
                        speed,
                        "#0088ff", 
                        4
                    ));
                }
            }
        }
    }

if (currentPlayer === "reimu" && frame % 5 === 0) {
    playerBullets.push(new Bullet(player.x - 8, player.y, -Math.PI/2, 8, "#44aaff", 3, 2, true));
    playerBullets.push(new Bullet(player.x + 8, player.y, -Math.PI/2, 8, "#44aaff", 3, 2, true));
} 

else if (currentPlayer === "marisa" && frame % 5 === 0) {
    playerBullets.push(new Bullet(player.x, player.y, -Math.PI/2, 10, "#ffff00", 8, 6));
}

else if (currentPlayer === "sakuya" && frame % 10 === 0) {
    playerBullets.push(
        new Bullet(player.x, player.y, -Math.PI/2, 14, "#3399ff", 3, 10, true) // 👈 bật homing
    );
}

        }

        function update() {

if (timeStop > 0) {
    timeStop--;
}

            if (isGameOver || boss.hp <= 0 || !gameStarted) return;
            if (player.invuln > 0) player.invuln--;
            if (shake > 0) shake *= 0.9;
            if (bombTimer > 0) {
                bombTimer--;
                if (currentPlayer === "marisa") { boss.hp -= 5; shake = 5; } // Master Spark liên tục gây dam
            }
            spawnDanmaku();

arrows.forEach((a, i) => {

});

let cycle = frame % 1600;

lasers.forEach(l => {

    if (
        cycle >= 400 &&
        cycle < 800 &&
        l.active &&
        l.firing &&
        player.invuln === 0
    ) {

        let hitW = 60;
        let hitH = 25;

        let px = player.x;
        let py = player.y;

        if (
            Math.abs(py - l.targetY) < hitH &&
            Math.abs(px - l.currentX) < hitW
        ) {
            isGameOver = true;
            alert("GAME OVER");
        }
    }
});

            enemyBullets.forEach((b, i) => {
    if (timeStop <= 0) b.update();
                if (player.invuln === 0 && Math.hypot(b.x - player.x, b.y - player.y) < player.r + b.radius) { isGameOver = true; alert("GAME OVER"); }

if(
    b.y > canvas.height + 200 ||
    b.y < -200 ||
    b.x > canvas.width + 200 ||
    b.x < -200
){
    enemyBullets.splice(i, 1);
}

            });

            bombEffects.forEach((orb, i) => {
                orb.update();
                if (Math.hypot(orb.x - boss.x, orb.y - boss.y) < boss.r + orb.radius) { boss.hp -= orb.damage; bombEffects.splice(i, 1); }
            });

            playerBullets.forEach((pb, i) => {
                pb.update();
                if (Math.hypot(pb.x - boss.x, pb.y - boss.y) < boss.r) { boss.hp -= pb.damage; playerBullets.splice(i, 1); }
                if (pb.y < 0) playerBullets.splice(i, 1);
            });
            document.getElementById("hp-val").innerText = Math.max(0, Math.floor(boss.hp));
            if (boss.hp <= 0) { alert("VICTORY!"); }
        }

        function draw() {
            if (!gameStarted) return;
            ctx.save(); ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
            ctx.clearRect(-20, -20, canvas.width+40, canvas.height+40);
            if (timeStop > 0) {
    ctx.fillStyle = "rgba(200, 200, 255, 0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}
            // HP Bar
            ctx.fillStyle = "#333"; ctx.fillRect(50, 40, canvas.width - 100, 8);
            ctx.fillStyle = (boss.hp < 1000) ? "red" : "#ff00ff"; ctx.fillRect(50, 40, (canvas.width - 100) * (boss.hp / boss.maxHp), 8);

if (bombTimer === 0 && timeStop <= 0) {
    let cycle = frame % 1200;
    if (cycle >= 400 && cycle < 800) {
        lasers.forEach(l => l.draw());
    }
}

            // Master Spark (Marisa)
            if (bombTimer > 0 && currentPlayer === "marisa") {
                let sparkW = Math.sin(bombTimer * 0.1) * 20 + 120;
                let gradient = ctx.createLinearGradient(player.x - sparkW/2, 0, player.x + sparkW/2, 0);
                gradient.addColorStop(0, "rgba(255,255,200,0)"); gradient.addColorStop(0.5, "white"); gradient.addColorStop(1, "rgba(255,255,200,0)");
                ctx.fillStyle = gradient; ctx.fillRect(player.x - sparkW/2, 0, sparkW, player.y);
                ctx.fillStyle = "rgba(255,255,100,0.3)"; ctx.fillRect(player.x - sparkW, 0, sparkW*2, player.y);
            }

if (typeof imgKeine !== 'undefined') {
    ctx.drawImage(imgKeine, boss.x - 60, boss.y - 60, 120, 120);
}

let img = (currentPlayer === "reimu") ? imgReimu :
          (currentPlayer === "marisa") ? imgMarisa :
          imgSakuya;

if (img && img.complete) {
    ctx.drawImage(img, player.x - 20, player.y - 20, 40, 40);
} else {
    // fallback nếu ảnh chưa load
    ctx.fillStyle = (currentPlayer === "reimu") ? "#44aaff" : "#ffff00";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.visualR, 0, Math.PI * 2);
    ctx.fill();
}

                // Tâm né đạn (Hitbox)
                ctx.fillStyle = "lime"; 
                ctx.beginPath(); 
                ctx.arc(player.x, player.y, 3, 0, Math.PI*2);
                ctx.fill();

arrows.forEach(a => a.draw());

            enemyBullets.forEach(b => b.draw());
            playerBullets.forEach(b => b.draw());
            bombEffects.forEach(orb => orb.draw());

            
            
            ctx.restore(); 
            update(); 
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
